<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Land Acquisition Valuation Engine</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #111; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        .control-panel { position: absolute; top: 20px; right: 20px; z-index: 1000; background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 280px; }
        .control-panel h2 { margin: 0 0 10px 0; font-size: 16px; color: #004b87; font-weight: bold; }
        .panel-btn { width: 100%; background: #004b87; color: white; border: none; padding: 10px; margin-bottom: 8px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 13px; transition: background 0.2s; }
        .panel-btn:hover { background: #003360; }
        .panel-btn.active { background: #e74c3c; }
        
        .measurement-stats { margin-top: 10px; padding: 12px; background: #e6f0fa; border-radius: 4px; font-size: 13px; color: #222; display: none; border-left: 4px solid #004b87; line-height: 1.6; }
        .measurement-stats div { border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 4px; margin-bottom: 4px; }
        .measurement-stats div:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }

        .leaflet-popup-content-wrapper { border-radius: 8px; box-shadow: 0 15px 30px rgba(0,0,0,0.5); padding: 0; overflow: hidden; }
        .leaflet-popup-content { margin: 0; width: 360px !important; } 
        .card-header { background: #004b87; color: white; padding: 15px; font-size: 15px; font-weight: bold; margin: 0; }
        .card-img { width: 100%; height: 200px; object-fit: cover; display: block; background: #eee; border-bottom: 1px solid #ccc; }
        .card-body { padding: 15px; background: #fff; }
        
        .pulse-icon { width: 22px; height: 22px; border-radius: 50%; border: 2px solid white; transition: background-color 0.5s ease; }
        .marker-blue { background: #3498db; box-shadow: 0 0 0 0 rgba(52, 152, 219, 0.7); animation: pulseBlue 1.5s infinite; }
        .marker-green { background: #2ecc71; box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); animation: pulseGreen 1.5s infinite; }
        .marker-yellow { background: #f1c40f; box-shadow: 0 0 0 0 rgba(241, 196, 15, 0.7); animation: pulseYellow 1.5s infinite; }
        .marker-red { background: #e74c3c; box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); animation: pulseRed 1.5s infinite; }

        @keyframes pulseBlue { to { box-shadow: 0 0 0 18px rgba(52, 152, 219, 0); } }
        @keyframes pulseGreen { to { box-shadow: 0 0 0 18px rgba(46, 204, 113, 0); } }
        @keyframes pulseYellow { to { box-shadow: 0 0 0 18px rgba(241, 196, 15, 0); } }
        @keyframes pulseRed { to { box-shadow: 0 0 0 18px rgba(231, 76, 60, 0); } }
        
        .form-input { width: 100%; padding: 8px; margin-bottom: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; font-size: 13px; }
    </style>
</head>
<body>

    <div class="control-panel">
        <h2>Land Survey Tools</h2>
        <button id="drawBtn" class="panel-btn" onclick="toggleDrawMode()">Enable Plot Boundary Tool</button>
        <button id="clearBtn" class="panel-btn" style="background:#7f8c8d;" onclick="clearDrawings()">Clear Measurement Layers</button>
        
        <div id="statsPanel" class="measurement-stats">
            <div id="statARP" style="color: #004b87; font-size: 14px;"></div>
            <div id="statAcres"></div>
            . <div id="statPerches"></div>
            <div id="statHectares"></div>
            <div id="statFeet"></div>
        </div>
    </div>

    <div id="map"></div>

    <script>
        const baseCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ77m59Sn5PwSO2Ac4CvSVzmCIC11vqPfD-VaYzZlAK6cgzDs_tQWWbvaIN4LsG6NC3aPQN-UPsuhcg/pub?gid=162359919&single=true&output=csv';
        const csvUrl = baseCsvUrl + '&v=' + new Date().getTime(); 
        const webAppUrl = "https://script.google.com/macros/s/AKfycbzzSS1NI5VqKSOGqhEbDeEjNLAaIzUIcSpMKQNCGHvOdPHj8hl0HRaEtQ1ZAgP_w-pJYg/exec";

        // Global state storage to allow instant pop-up rebuilding
        const markersMap = {};
        const rowsDataMap = {};

        const map = L.map('map', { doubleClickZoom: false }).setView([6.9271, 79.8612], 8);

        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 });
        const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' });
        const topoLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 17, attribution: '© OpenTopoMap' });
        const roadsLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 });
        const labelsLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 });

        satelliteLayer.addTo(map); roadsLayer.addTo(map); labelsLayer.addTo(map);

        const baseMaps = { "Satellite View": satelliteLayer, "Street Map": osmLayer, "Terrain & Contours": topoLayer };
        const overlayMaps = { "Satellite Roads": roadsLayer, "Satellite Labels": labelsLayer };
        L.control.layers(baseMaps, overlayMaps, { position: 'bottomleft' }).addTo(map);

        const geocoderOptions = L.Control.Geocoder.nominatim({ geocodingQueryParams: { countrycodes: 'lk' } });
        L.Control.geocoder({ geocoder: geocoderOptions, defaultMarkGeocode: false, placeholder: "Search for a location...", position: 'topleft' })
        .on('markgeocode', function(e) {
            const bbox = e.geocode.bbox;
            const poly = L.polygon([ bbox.getSouthEast(), bbox.getNorthEast(), bbox.getNorthWest(), bbox.getSouthWest() ]);
            map.fitBounds(poly.getBounds());
            L.marker(e.geocode.center).addTo(map).bindPopup(`<b>${e.geocode.name}</b>`).openPopup();
        }).addTo(map);

        // REUSABLE POPUP BUILDER ENGINE
        function generateCardContent(row) {
            const projectId = row['Project Number'];
            const name = row.Name || 'Acquisition Target';
            const lat = parseFloat(row.Latitude);
            const lng = parseFloat(row.Longitude);
            let photoUrl = row['Site Photo'] || '';
            const mgtStatus = row['Management Status'] || '';

            let imageHTML = '';
            if (photoUrl && photoUrl.includes('drive.google.com')) {
                const match = photoUrl.match(/id=([a-zA-Z0-9_-]+)/) || photoUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
                if (match) imageHTML = `<iframe src="https://drive.google.com/file/d/${match[1]}/preview" class="card-img" style="border: none;"></iframe>`; 
            } else if (photoUrl) {
                imageHTML = `<img src="${photoUrl}" class="card-img" alt="Site Photo" onerror="this.style.display='none'">`;
            }

            // Generate Map URLs natively
            const mapsUrl = `https://www.google.com/maps?q=${lat},${lng}`;
            row['Google Maps Link'] = mapsUrl; // Push internally into local entry object

            let allDataText = "";
            let allDataHTML = "<div class='data-scrollbox' style='max-height: 140px; overflow-y: auto; background: #f9f9f9; padding: 10px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 12px; font-size: 12px; line-height: 1.4;'>";

            for (const [columnName, columnValue] of Object.entries(row)) {
                if (columnValue && !['Latitude', 'Longitude', 'Site Photo', 'Timestamp', 'Coordinates'].includes(columnName)) {
                    allDataText += `*${columnName}:* ${columnValue}\n`;
                    allDataHTML += `<strong style="color:#004b87;">${columnName}:</strong> ${columnValue}<br><hr style="margin:4px 0; border:0; border-top:1px solid #eee;">`;
                }
            }
            allDataHTML += "</div>";

            const whatsappText = `📍 *NEW LAND PROSPECT: [${projectId}] ${name}*
*Status:* ${mgtStatus || 'Pending Review'}
*Google Maps Navigation:* ${mapsUrl}

📋 *ALL PROPERTY DETAILS:*
${allDataText}
📸 *Drive Photos:* ${photoUrl}`;

            return `
                <div class="card-header">[${projectId}] ${name}</div>
                ${imageHTML}
                <div class="card-body">
                    <h4 style="margin: 0 0 8px 0; color: #333; font-size: 13px;">Full Property Data:</h4>
                    ${allDataHTML}
                    
                    <h4 style="margin: 0 0 8px 0; color: #333; font-size: 14px;">Management Action</h4>
                    
                    <select id="status-${projectId}" class="form-input">
                        <option value="" disabled ${!mgtStatus ? 'selected' : ''}>Select Status...</option>
                        <option value="1. Previously Inspected Property" ${mgtStatus.includes('1.') ? 'selected' : ''}>1. Previously Inspected</option>
                        <option value="2. Previously Evaluated and Rejected" ${mgtStatus.includes('2.') ? 'selected' : ''}>2. Evaluated & Rejected</option>
                        <option value="3. Investigate more" ${mgtStatus.includes('3.') ? 'selected' : ''}>3. Investigate More</option>
                        <option value="4. Recommended for Further Evaluation" ${mgtStatus.includes('4.') ? 'selected' : ''}>4. Recommended to Proceed</option>
                        <option value="5. Do Not Proceed" ${mgtStatus.includes('5.') ? 'selected' : ''}>5. Do Not Proceed</option>
                    </select>
                    
                    <input type="text" id="reason-${projectId}" class="form-input" placeholder="Reason (if rejected)" value="${row['Rejection Reason'] || ''}">
                    <textarea id="comments-${projectId}" class="form-input" placeholder="Additional comments..." style="resize: vertical;">${row['Management Comments'] || ''}</textarea>
                    
                    <button onclick="updateStatus('${projectId}', event)" style="background: #004b87; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; border-radius: 4px; font-weight: bold; margin-bottom: 8px; transition: background 0.3s;">
                        Update Database
                    </button>
                    
                    <button onclick="copyForWhatsApp(\`${encodeURIComponent(whatsappText)}\`)" style="background: #25D366; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; border-radius: 4px; font-weight: bold;">
                        Copy for WhatsApp 📱
                    </button>
                </div>
            `;
        }

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            transformHeader: function(header) { return header.trim(); },
            complete: function(results) {
                results.data.forEach(row => {
                    if (row.Latitude && row.Longitude) {
                        const lat = parseFloat(row.Latitude);
                        const lng = parseFloat(row.Longitude);

                        if (!isNaN(lat) && !isNaN(lng)) {
                            const projectId = row['Project Number'];
                            if(!projectId) return; 

                            // Map structural memory assignment
                            rowsDataMap[projectId] = row;

                            const mgtStatus = row['Management Status'] || '';
                            let iconColorClass = 'marker-blue'; 
                            if (mgtStatus.includes('2.') || mgtStatus.includes('5.') || mgtStatus.includes('Rejected') || mgtStatus.includes('Do Not Proceed')) {
                                iconColorClass = 'marker-red';
                            } else if (mgtStatus.includes('4.') || mgtStatus.includes('Recommended')) {
                                iconColorClass = 'marker-green';
                            } else if (mgtStatus.includes('1.') || mgtStatus.includes('3.') || mgtStatus.includes('Investigate')) {
                                iconColorClass = 'marker-yellow';
                            }

                            const activeMarkerIcon = L.divIcon({ 
                                className: 'custom-div-icon', 
                                html: `<div id="icon-${projectId}" class='pulse-icon ${iconColorClass}'></div>`, 
                                iconSize: [22, 22], iconAnchor: [11, 11] 
                            });

                            const cardHtml = generateCardContent(row);
                            const marker = L.marker([lat, lng], { icon: activeMarkerIcon }).addTo(map).bindPopup(cardHtml);
                            
                            // Map instance tracking
                            markersMap[projectId] = marker;
                        }
                    }
                });
            }
        });

        // LIVE TWO-WAY DATA MODIFICATION ENGINE
        async function updateStatus(projectId, event) {
          const statusElement = document.getElementById(`status-${projectId}`);
          const reasonElement = document.getElementById(`reason-${projectId}`);
          const commentsElement = document.getElementById(`comments-${projectId}`);

          const btn = event.target;
          const originalText = btn.innerText;
          btn.innerText = "Updating Database...";
          btn.style.backgroundColor = "#7f8c8d";
          btn.disabled = true;

          const selectedStatus = statusElement.value;

          try {
              const response = await fetch(webAppUrl, {
                  method: 'POST',
                  redirect: 'follow', 
                  headers: { "Content-Type": "text/plain;charset=utf-8" },
                  body: JSON.stringify({
                      projectId: projectId, 
                      status: selectedStatus,
                      reason: reasonElement.value,
                      comments: commentsElement.value
                  })
              });
              
              const responseData = await response.json();
              
              if(responseData.status === 'success') {
                  // 1. Locally update the internal JSON storage array state
                  const row = rowsDataMap[projectId];
                  row['Management Status'] = selectedStatus;
                  row['Rejection Reason'] = reasonElement.value;
                  row['Management Comments'] = commentsElement.value;
                  row['Management Update Time'] = new Date().toLocaleString(); // Local update visibility marker

                  // 2. Instant Local Marker Color Switcher
                  const iconDiv = document.getElementById(`icon-${projectId}`);
                  if (iconDiv) {
                      iconDiv.classList.remove('marker-blue', 'marker-yellow', 'marker-green', 'marker-red');
                      if (selectedStatus.includes('2.') || selectedStatus.includes('5.') || selectedStatus.includes('Rejected')) {
                          iconDiv.classList.add('marker-red');
                      } else if (selectedStatus.includes('4.') || selectedStatus.includes('Recommended')) {
                          iconDiv.classList.add('marker-green');
                      } else if (selectedStatus.includes('1.') || selectedStatus.includes('3.') || selectedStatus.includes('Investigate')) {
                          iconDiv.classList.add('marker-yellow');
                      } else {
                          iconDiv.classList.add('marker-blue');
                      }
                  }

                  // 3. Instant Card Popup Structure Rewrite Engine
                  const updatedCardHtml = generateCardContent(row);
                  markersMap[projectId].setPopupContent(updatedCardHtml);

                  alert('Database Updated Successfully! Changes are preserved and visible.');
                  map.closePopup(); 
              } else {
                  alert('Backend error: ' + responseData.message);
                  btn.innerText = originalText;
                  btn.style.backgroundColor = "#004b87";
                  btn.disabled = false;
              }

          } catch (error) {
              console.error('Network Error:', error);
              alert('Update failed. Connection error.');
              btn.innerText = originalText;
              btn.style.backgroundColor = "#004b87";
              btn.disabled = false;
          }
        }

        function copyForWhatsApp(encodedText) {
            const textToCopy = decodeURIComponent(encodedText);
            navigator.clipboard.writeText(textToCopy).then(() => {
                alert("Details with clickable map routing copied!");
            }).catch(err => {
                alert("Copy failed.");
            });
        }

        // ADVANCED PARCEL MEASUREMENT ENGINE
        let isDrawing = false; let drawnPoints = []; let drawPointsGroup = L.layerGroup().addTo(map); let livePolyline = null; let finalPolygon = null;

        function toggleDrawMode() {
            isDrawing = !isDrawing;
            const btn = document.getElementById('drawBtn');
            if (isDrawing) {
                btn.innerText = "Exit Survey Mode"; btn.classList.add('active'); map.getContainer().style.cursor = 'crosshair'; clearDrawings();
            } else { finalizePolygon(); }
        }

        map.on('click', function(e) {
            if (!isDrawing) return;
            drawnPoints.push(e.latlng);
            L.circleMarker(e.latlng, { radius: 4, color: '#e74c3c', fillColor: '#fff', fillOpacity: 1 }).addTo(drawPointsGroup);
            if (livePolyline) { livePolyline.addLatLng(e.latlng); } else { livePolyline = L.polyline(drawnPoints, { color: '#e74c3c', weight: 3, dashArray: '5, 5' }).addTo(drawPointsGroup); }
            if (drawnPoints.length >= 3) { updateAreaMetrics(); }
        });

        map.on('dblclick', function(e) { if (isDrawing && drawnPoints.length >= 3) { finalizePolygon(); } });

        function finalizePolygon() {
            isDrawing = false;
            const btn = document.getElementById('drawBtn');
            btn.innerText = "Enable Plot Boundary Tool"; btn.classList.remove('active'); map.getContainer().style.cursor = '';
            if (drawnPoints.length < 3) { clearDrawings(); return; }
            if (livePolyline) map.removeLayer(livePolyline);
            finalPolygon = L.polygon(drawnPoints, { color: '#004b87', fillColor: '#004b87', fillOpacity: 0.3, weight: 2 }).addTo(drawPointsGroup);
            updateAreaMetrics();
        }

        function updateAreaMetrics() {
            if (drawnPoints.length < 3) return;
            const refLat = drawnPoints[0].lat;
            const latFactor = 111132.92; 
            const lngFactor = 111132.92 * Math.cos(refLat * Math.PI / 180);
            let areaInMeters = 0; const numPoints = drawnPoints.length;

            for (let i = 0; i < numPoints; i++) {
                const p1 = drawnPoints[i]; const p2 = drawnPoints[(i + 1) % numPoints];
                areaInMeters += ((p1.lng * lngFactor) * (p2.lat * latFactor)) - ((p2.lng * lngFactor) * (p1.lat * latFactor));
            }
            const finalAreaSqM = Math.abs(areaInMeters / 2);
            
            const sqFt = finalAreaSqM * 10.7639;
            const totalHectares = finalAreaSqM / 10000;
            const totalAcres = finalAreaSqM / 4046.86;
            const totalPerches = finalAreaSqM / 25.2929;

            const acresInt = Math.floor(totalPerches / 160);
            const roodsInt = Math.floor((totalPerches % 160) / 40);
            const perchesRem = (totalPerches % 160) % 40;

            document.getElementById('statsPanel').style.display = 'block';
            document.getElementById('statARP').innerHTML = `<b>A-R-P:</b> ${acresInt} Acres, ${roodsInt} Roods, ${perchesRem.toLocaleString(undefined, {maximumFractionDigits: 2})} Perches`;
            document.getElementById('statAcres').innerHTML = `<b>Only Acres:</b> ${totalAcres.toLocaleString(undefined, {maximumFractionDigits: 4})} A`;
            document.getElementById('statPerches').innerHTML = `<b>Only Perches:</b> ${totalPerches.toLocaleString(undefined, {maximumFractionDigits: 2})} P`;
            document.getElementById('statHectares').innerHTML = `<b>Metric:</b> ${totalHectares.toLocaleString(undefined, {maximumFractionDigits: 4})} Hectares`;
            document.getElementById('statFeet').innerHTML = `<b>Imperial:</b> ${sqFt.toLocaleString(undefined, {maximumFractionDigits: 2})} sq.ft`;
        }

        function clearDrawings() { drawnPoints = []; drawPointsGroup.clearLayers(); livePolyline = null; finalPolygon = null; document.getElementById('statsPanel').style.display = 'none'; }
    </script>
</body>
</html>
